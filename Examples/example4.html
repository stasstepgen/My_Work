<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyberpunk Countdown</title>
  <style>
    :root {
      --bg: #050918;
      --panel: rgba(4, 16, 33, 0.78);
      --glow: #29f6ff;
      --accent: #ff29d8;
      --text: #f2f8ff;
      --dim: #8ba3c9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, rgba(41, 246, 255, 0.1), transparent 25%),
                  radial-gradient(circle at bottom right, rgba(255, 41, 216, 0.12), transparent 24%),
                  linear-gradient(180deg, #07101e 0%, #02040b 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(180deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      width: min(100%, 960px);
      padding: 2rem;
      border: 1px solid rgba(41, 246, 255, 0.18);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      background: var(--panel);
      box-shadow: 0 0 80px rgba(41, 246, 255, 0.08), 0 0 120px rgba(255, 41, 216, 0.05);
      position: relative;
      overflow: hidden;
    }

    h1 {
      font-size: clamp(2rem, 3vw, 3.2rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      text-align: center;
      color: var(--dim);
      margin-bottom: 2rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    .input-panel {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .input-panel input {
      min-width: 220px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 1rem 1.2rem;
      background: rgba(4, 16, 33, 0.95);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      outline: none;
    }

    .input-panel input:focus {
      border-color: var(--glow);
      box-shadow: 0 0 30px rgba(41, 246, 255, 0.3);
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 1rem;
      align-items: stretch;
      position: relative;
      z-index: 1;
    }

    .card {
      background: rgba(5, 9, 24, 0.95);
      border: 1px solid rgba(255, 41, 216, 0.22);
      border-radius: 20px;
      padding: 1.5rem 1rem;
      text-align: center;
      overflow: hidden;
      position: relative;
      min-height: 170px;
      box-shadow: inset 0 0 1px rgba(255,255,255,0.08);
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(41,246,255,0.14), transparent 40%);
      opacity: 0.2;
      pointer-events: none;
    }

    .card::after {
      background: linear-gradient(45deg, transparent 20%, rgba(255,41,216,0.12) 40%, transparent 60%);
      mix-blend-mode: screen;
    }

    .value {
      font-size: clamp(2.5rem, 4vw, 4.8rem);
      line-height: 1;
      letter-spacing: 0.08em;
      margin-bottom: 0.7rem;
      color: var(--text);
      position: relative;
      text-shadow: 0 0 14px rgba(41, 246, 255, 0.35);
      animation: flicker 6s infinite ease-in-out;
    }

    .label {
      font-size: 0.9rem;
      letter-spacing: 0.22em;
      color: var(--dim);
      text-transform: uppercase;
    }

    .glitch {
      position: absolute;
      inset: -10% 0 0 0;
      background: radial-gradient(circle at 20% 20%, rgba(41,246,255,0.25), transparent 8%),
                  radial-gradient(circle at 80% 50%, rgba(255,41,216,0.2), transparent 12%);
      pointer-events: none;
      opacity: 0.55;
      z-index: 0;
      animation: drift 10s linear infinite;
    }

    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; transform: translateY(0); }
      20% { opacity: 0.7; transform: translateY(-2px); }
      24% { opacity: 0.8; transform: translateY(1px); }
      55% { opacity: 0.85; transform: translateY(-1px); }
    }

    @keyframes drift {
      0% { transform: translateY(-5%) translateX(-3%); }
      50% { transform: translateY(4%) translateX(3%); }
      100% { transform: translateY(-5%) translateX(-3%); }
    }

    .glitch-text {
      display: inline-block;
      position: relative;
    }

    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
      clip-path: inset(0 0 0 0);
    }

    .glitch-text::before {
      animation: glitch-anim-1 3s infinite linear alternate-reverse;
      color: rgba(41,246,255,0.65);
      z-index: -1;
    }

    .glitch-text::after {
      animation: glitch-anim-2 2.7s infinite linear alternate-reverse;
      color: rgba(255,41,216,0.65);
      z-index: -2;
    }

    @keyframes glitch-anim-1 {
      0% { transform: translate(0, 0); clip-path: inset(0 0 90% 0); }
      20% { transform: translate(-2px, -2px); clip-path: inset(10% 0 50% 0); }
      40% { transform: translate(2px, 1px); clip-path: inset(40% 0 30% 0); }
      60% { transform: translate(-1px, 2px); clip-path: inset(30% 0 20% 0); }
      80% { transform: translate(0, -1px); clip-path: inset(50% 0 10% 0); }
      100% { transform: translate(1px, 0); clip-path: inset(0 0 20% 0); }
    }

    @keyframes glitch-anim-2 {
      0% { transform: translate(0, 0); clip-path: inset(0 0 80% 0); }
      20% { transform: translate(3px, 1px); clip-path: inset(20% 0 40% 0); }
      40% { transform: translate(-3px, -2px); clip-path: inset(30% 0 25% 0); }
      60% { transform: translate(1px, 3px); clip-path: inset(50% 0 10% 0); }
      80% { transform: translate(-1px, -1px); clip-path: inset(10% 0 60% 0); }
      100% { transform: translate(0, 0); clip-path: inset(0 0 30% 0); }
    }

    .status {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.95rem;
    }

    @media (max-width: 720px) {
      .countdown {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
      .input-panel {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glitch"></div>
    <h1>Neo-Countdown</h1>
    <p class="subtitle">Select a future date and watch the cyber clock pulse toward zero.</p>

    <div class="input-panel">
      <input id="targetDate" type="datetime-local" aria-label="Target date and time" />
      <input id="setButton" type="button" value="Set Countdown" />
    </div>

    <div class="countdown" aria-live="polite">
      <div class="card">
        <div class="value glitch-text" id="days" data-text="00">00</div>
        <div class="label">Days</div>
      </div>
      <div class="card">
        <div class="value glitch-text" id="hours" data-text="00">00</div>
        <div class="label">Hours</div>
      </div>
      <div class="card">
        <div class="value glitch-text" id="minutes" data-text="00">00</div>
        <div class="label">Minutes</div>
      </div>
      <div class="card">
        <div class="value glitch-text" id="seconds" data-text="00">00</div>
        <div class="label">Seconds</div>
      </div>
    </div>

    <p class="status" id="status">Awaiting your target.</p>
  </div>

  <script>
    const targetInput = document.getElementById('targetDate');
    const setButton = document.getElementById('setButton');
    const status = document.getElementById('status');
    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');

    let countdownInterval = null;
    let targetTimestamp = null;

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function updateCountdown() {
      if (!targetTimestamp) return;

      const now = Date.now();
      const diff = targetTimestamp - now;

      if (diff <= 0) {
        clearInterval(countdownInterval);
        countdownInterval = null;
        status.textContent = 'The future has arrived.';
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        setGlitchText('days', '00');
        setGlitchText('hours', '00');
        setGlitchText('minutes', '00');
        setGlitchText('seconds', '00');
        return;
      }

      const seconds = Math.floor(diff / 1000) % 60;
      const minutes = Math.floor(diff / (1000 * 60)) % 60;
      const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
      setGlitchText('days', pad(days));
      setGlitchText('hours', pad(hours));
      setGlitchText('minutes', pad(minutes));
      setGlitchText('seconds', pad(seconds));
    }

    function setGlitchText(id, value) {
      const el = document.getElementById(id);
      el.dataset.text = value;
    }

    function setCountdown() {
      const inputValue = targetInput.value;
      const selectedTime = new Date(inputValue).getTime();

      if (!inputValue || Number.isNaN(selectedTime)) {
        status.textContent = 'Please select a valid date and time.';
        return;
      }

      if (selectedTime <= Date.now()) {
        status.textContent = 'Pick a future moment, not the past.';
        return;
      }

      targetTimestamp = selectedTime;
      clearInterval(countdownInterval);
      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
      status.textContent = 'Countdown engaged. Stay sharp.';
    }

    setButton.addEventListener('click', setCountdown);

    targetInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        event.preventDefault();
        setCountdown();
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      const now = new Date();
      now.setMinutes(now.getMinutes() + 5);
      targetInput.value = now.toISOString().slice(0, 16);
    });
  </script>
</body>
</html>
