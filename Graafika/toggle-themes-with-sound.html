<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toggle Themes with Sound</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --button-bg: #f0f0f0;
      --button-text: #333333;
      --shadow: rgba(0, 0, 0, 0.1);
    }
    [data-theme="dark"] {
      --bg-color: #1a1a1a;
      --text-color: #ffffff;
      --button-bg: #333333;
      --button-text: #ffffff;
      --shadow: rgba(255, 255, 255, 0.1);
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      display: grid;
      place-items: center;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      margin: 0 0 2rem;
      font-size: 3rem;
      letter-spacing: -0.02em;
    }
    .theme-toggle {
      padding: 1rem 2rem;
      border: none;
      border-radius: 50px;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--shadow);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .theme-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--shadow);
    }
    .theme-toggle::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }
    .theme-toggle:active::before {
      width: 300px;
      height: 300px;
    }
    .status {
      margin-top: 2rem;
      font-size: 1.1rem;
      opacity: 0.8;
    }
  </style>
</head>
<body data-theme="light">
  <div class="container">
    <h1>Toggle Themes</h1>
    <button class="theme-toggle" id="themeButton">Switch to Dark Theme</button>
    <div class="status" id="status">Current theme: Light</div>
  </div>

  <script>
    const button = document.getElementById('themeButton');
    const statusDiv = document.getElementById('status');
    const body = document.body;
    let isDark = false;

    // Initialize Web Audio
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);

    function playToggleSound() {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(isDark ? 800 : 600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(isDark ? 400 : 300, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.15);
    }

    function toggleTheme() {
      isDark = !isDark;
      body.setAttribute('data-theme', isDark ? 'dark' : 'light');
      button.textContent = isDark ? 'Switch to Light Theme' : 'Switch to Dark Theme';
      statusDiv.textContent = `Current theme: ${isDark ? 'Dark' : 'Light'}`;
      playToggleSound();
    }

    button.addEventListener('click', toggleTheme);
  </script>
</body>
</html>
