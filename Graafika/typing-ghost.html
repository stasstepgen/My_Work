<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Ghost</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      color: #00ff88;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 800px;
      width: 100%;
    }
    h1 {
      margin: 0 0 2rem;
      font-size: 3rem;
      letter-spacing: -0.02em;
      color: white;
    }
    .input-container {
      margin-bottom: 2rem;
    }
    .ghost-input {
      width: 100%;
      padding: 1rem;
      border: 2px solid #00ff88;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.5);
      color: #00ff88;
      font-size: 1.2rem;
      font-family: inherit;
      outline: none;
      caret-color: #00ff88;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }
    .ghost-input::placeholder {
      color: rgba(0, 255, 136, 0.5);
    }
    .display-area {
      min-height: 200px;
      padding: 1.5rem;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      font-size: 1.5rem;
      line-height: 1.6;
      text-align: left;
      overflow: hidden;
      position: relative;
    }
    .ghost-char {
      display: inline-block;
      animation: ghost-appear 0.5s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    @keyframes ghost-appear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .hint {
      margin-top: 1rem;
      font-size: 1rem;
      opacity: 0.7;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Typing Ghost</h1>
    <div class="input-container">
      <input type="text" class="ghost-input" id="ghostInput" placeholder="Start typing to see the ghost effect..." maxlength="100">
    </div>
    <div class="display-area" id="displayArea"></div>
    <div class="hint">Each character appears with a delay, rising smoothly from below.</div>
  </div>

  <script>
    const input = document.getElementById('ghostInput');
    const displayArea = document.getElementById('displayArea');
    let currentText = '';
    let charIndex = 0;

    function updateDisplay() {
      displayArea.innerHTML = '';
      for (let i = 0; i < currentText.length; i++) {
        const char = currentText[i];
        const span = document.createElement('span');
        span.className = 'ghost-char';
        span.textContent = char === ' ' ? '\u00A0' : char; // Preserve spaces
        span.style.animationDelay = `${i * 0.1}s`;
        displayArea.appendChild(span);
      }
    }

    input.addEventListener('input', (event) => {
      const newText = event.target.value;
      if (newText.length > currentText.length) {
        // Text added
        currentText = newText;
        updateDisplay();
      } else if (newText.length < currentText.length) {
        // Text removed
        currentText = newText;
        updateDisplay();
      }
    });

    // Clear display when input is cleared
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Backspace' && input.selectionStart === input.selectionEnd && input.selectionStart === currentText.length) {
        setTimeout(() => {
          currentText = input.value;
          updateDisplay();
        }, 10);
      }
    });
  </script>
</body>
</html>
