<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Background Gradient</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
      color: white;
      display: grid;
      place-items: center;
      text-align: center;
      transition: background 0.4s ease;
      background: radial-gradient(circle at top left, #ff7b72, #1a1926 40%);
    }
    .container {
      padding: 2rem;
      max-width: 520px;
      backdrop-filter: blur(18px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 2.8vw, 3.2rem);
      letter-spacing: -0.04em;
    }
    p {
      margin: 0;
      line-height: 1.7;
      opacity: 0.86;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dynamic Background Gradient</h1>
    <p>Move the pointer to a corner and watch the page's gradient shift smoothly around it.</p>
  </div>

  <script>
    const body = document.body;
    const corners = {
      topLeft: ['#ff7b72', '#2d1c66'],
      topRight: ['#56d9ff', '#1f214d'],
      bottomLeft: ['#f6ff7f', '#2a2f1a'],
      bottomRight: ['#a86dff', '#131824']
    };

    function updateGradient(x, y) {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const isLeft = x < width / 2;
      const isTop = y < height / 2;
      const key = isTop ? (isLeft ? 'topLeft' : 'topRight') : (isLeft ? 'bottomLeft' : 'bottomRight');
      const [start, end] = corners[key];
      body.style.background = `radial-gradient(circle at ${x}px ${y}px, ${start} 0%, ${end} 42%, #090a14 100%)`;
    }

    window.addEventListener('pointermove', event => {
      updateGradient(event.clientX, event.clientY);
    });

    window.addEventListener('resize', () => {
      updateGradient(window.innerWidth / 2, window.innerHeight / 2);
    });
  </script>
</body>
</html>
