<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticker Slap</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      color: white;
      display: grid;
      place-items: center;
      cursor: crosshair;
      overflow: hidden;
      position: relative;
    }
    .container {
      text-align: center;
      padding: 2rem;
      z-index: 1;
    }
    h1 {
      margin: 0 0 1rem;
      font-size: 3rem;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0;
      font-size: 1.2rem;
      opacity: 0.9;
      max-width: 600px;
    }
    .sticker {
      position: absolute;
      font-size: 2rem;
      pointer-events: none;
      animation: slap 0.6s ease-out forwards;
      z-index: 10;
    }
    @keyframes slap {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 0;
      }
      50% {
        transform: scale(1.2) rotate(180deg);
        opacity: 1;
      }
      100% {
        transform: scale(1) rotate(var(--rotation));
        opacity: 1;
      }
    }
    .sticker.fade-out {
      animation: fade-out 2s ease-out 1s forwards;
    }
    @keyframes fade-out {
      to { opacity: 0; transform: scale(0.5) rotate(var(--rotation)); }
    }
    .clear-button {
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }
    .clear-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Sticker Slap</h1>
    <p>Click anywhere on the page to slap down random stickers with fun rotations!</p>
    <button class="clear-button" id="clearButton">Clear All Stickers</button>
  </div>

  <script>
    const stickers = ['🎉', '⭐', '🌟', '💖', '🎈', '🎊', '🎁', '🎂', '🍰', '🎶', '🎵', '🎤', '🎸', '🎺', '🎷', '🥁', '🎹', '🎼', '🎭', '🎨'];
    const body = document.body;
    const clearButton = document.getElementById('clearButton');
    let stickerCount = 0;

    function getRandomSticker() {
      return stickers[Math.floor(Math.random() * stickers.length)];
    }

    function getRandomRotation() {
      return Math.random() * 360;
    }

    function createSticker(x, y) {
      const sticker = document.createElement('div');
      sticker.className = 'sticker';
      sticker.textContent = getRandomSticker();
      sticker.style.left = `${x - 20}px`;
      sticker.style.top = `${y - 20}px`;
      const rotation = getRandomRotation();
      sticker.style.setProperty('--rotation', `${rotation}deg`);
      body.appendChild(sticker);

      // Add fade-out after animation
      setTimeout(() => {
        sticker.classList.add('fade-out');
        setTimeout(() => {
          if (sticker.parentNode) {
            sticker.parentNode.removeChild(sticker);
          }
        }, 2000);
      }, 600);

      stickerCount++;
    }

    function clearStickers() {
      const allStickers = document.querySelectorAll('.sticker');
      allStickers.forEach(sticker => {
        if (sticker.parentNode) {
          sticker.parentNode.removeChild(sticker);
        }
      });
      stickerCount = 0;
    }

    body.addEventListener('click', (event) => {
      if (event.target === clearButton) return;
      createSticker(event.clientX, event.clientY);
    });

    clearButton.addEventListener('click', clearStickers);
  </script>
</body>
</html>
