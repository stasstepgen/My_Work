<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnetic Buttons</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #2a2f4f 0%, #0c101f 100%);
      color: #f2f4ff;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .button-grid {
      display: grid;
      gap: 1.25rem;
      grid-template-columns: repeat(3, minmax(140px, 180px));
    }
    .magnetic-button {
      position: relative;
      width: 100%;
      padding: 1.1rem 1.4rem;
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      color: #f8f9ff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.25s ease, background 0.3s ease;
    }
    .magnetic-button:hover {
      background: rgba(255, 255, 255, 0.14);
    }
    .magnetic-button::after {
      content: '';
      pointer-events: none;
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at var(--px, 50%) var(--py, 50%), rgba(255,255,255,0.18), transparent 45%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .magnetic-button.hovered::after {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="button-grid">
    <button class="magnetic-button">Learn More</button>
    <button class="magnetic-button">Join Now</button>
    <button class="magnetic-button">Subscribe</button>
    <button class="magnetic-button">Download</button>
    <button class="magnetic-button">Contact</button>
    <button class="magnetic-button">Explore</button>
  </div>

  <script>
    const buttons = document.querySelectorAll('.magnetic-button');
    const strength = 36;
    const range = 140;

    function handlePointerMove(event) {
      const pointerX = event.clientX;
      const pointerY = event.clientY;

      buttons.forEach(button => {
        const rect = button.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const deltaX = pointerX - centerX;
        const deltaY = pointerY - centerY;
        const distance = Math.hypot(deltaX, deltaY);

        if (distance < range) {
          const normalized = 1 - distance / range;
          const offsetX = (deltaX / distance) * normalized * strength;
          const offsetY = (deltaY / distance) * normalized * strength;
          button.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
          button.style.setProperty('--px', `${50 + offsetX / rect.width * 100}%`);
          button.style.setProperty('--py', `${50 + offsetY / rect.height * 100}%`);
          button.classList.add('hovered');
        } else {
          button.style.transform = 'translate(0, 0)';
          button.classList.remove('hovered');
        }
      });
    }

    window.addEventListener('pointermove', handlePointerMove);
  </script>
</body>
</html>
