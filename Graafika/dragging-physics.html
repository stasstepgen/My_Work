<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragging Physics</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, sans-serif;
      background: #0d1118;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top left, rgba(58, 112, 255, 0.24), transparent 28%),
                  radial-gradient(circle at bottom right, rgba(120, 255, 167, 0.18), transparent 24%),
                  #0d1118;
    }

    .stage {
      position: relative;
      width: min(100vw, 1200px);
      height: min(100vh, 760px);
      padding: 2rem;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(18px);
    }

    .title {
      position: absolute;
      left: 2rem;
      top: 2rem;
      color: #f8fafc;
      font-size: clamp(1.1rem, 1.5vw, 2rem);
      z-index: 2;
      pointer-events: none;
    }

    .hint {
      position: absolute;
      left: 2rem;
      bottom: 2rem;
      right: 2rem;
      color: rgba(248, 250, 252, 0.75);
      font-size: 0.95rem;
      line-height: 1.6;
      z-index: 2;
      pointer-events: none;
      max-width: 42rem;
    }

    .item {
      position: absolute;
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(19, 121, 255, 0.95), rgba(117, 96, 255, 0.95));
      box-shadow: 0 30px 90px rgba(12, 23, 56, 0.35);
      cursor: grab;
      transition: transform 0.2s ease;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      user-select: none;
      touch-action: none;
    }

    .item:active {
      cursor: grabbing;
      transform: scale(0.96);
    }

    .item::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.22), transparent 38%);
      pointer-events: none;
    }

    .item span {
      position: relative;
      z-index: 1;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="panel"></div>
    <div class="title">Dragging Physics</div>
    <div class="hint">Grab any tile and drag it around. Each object lags slightly behind the pointer, then settles with a soft inertia as if it were heavy.</div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const itemCount = 10;
    const items = [];
    const bounds = stage.getBoundingClientRect();

    const config = {
      stiffness: 0.18,
      damping: 0.82,
      friction: 0.96,
    };

    for (let i = 0; i < itemCount; i++) {
      const element = document.createElement('div');
      element.className = 'item';
      element.innerHTML = `<span>Drag ${i + 1}</span>`;
      stage.appendChild(element);

      const x = 80 + (i % 5) * 130;
      const y = 120 + Math.floor(i / 5) * 160;

      items.push({
        element,
        x,
        y,
        targetX: x,
        targetY: y,
        vx: 0,
        vy: 0,
        pointerOffsetX: 0,
        pointerOffsetY: 0,
        dragging: false,
      });

      element.style.transform = `translate(${x}px, ${y}px)`;
      element.addEventListener('pointerdown', onPointerDown);
    }

    let activeItem = null;

    function onPointerDown(event) {
      event.preventDefault();
      const item = items.find((entry) => entry.element === event.currentTarget);
      if (!item) return;

      activeItem = item;
      item.dragging = true;
      const rect = item.element.getBoundingClientRect();
      item.pointerOffsetX = event.clientX - rect.left;
      item.pointerOffsetY = event.clientY - rect.top;
      item.targetX = event.clientX - bounds.left - item.pointerOffsetX;
      item.targetY = event.clientY - bounds.top - item.pointerOffsetY;
      item.vx = item.vx * 0.2;
      item.vy = item.vy * 0.2;
      item.element.setPointerCapture(event.pointerId);
      stage.style.cursor = 'grabbing';

      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp, { once: true });
    }

    function onPointerMove(event) {
      if (!activeItem) return;
      const clampedX = Math.min(bounds.width - 96, Math.max(0, event.clientX - bounds.left - activeItem.pointerOffsetX));
      const clampedY = Math.min(bounds.height - 96, Math.max(0, event.clientY - bounds.top - activeItem.pointerOffsetY));
      activeItem.targetX = clampedX;
      activeItem.targetY = clampedY;
    }

    function onPointerUp(event) {
      if (!activeItem) return;
      activeItem.dragging = false;
      activeItem = null;
      stage.style.cursor = 'default';
      window.removeEventListener('pointermove', onPointerMove);
    }

    function animate() {
      for (const item of items) {
        const dx = item.targetX - item.x;
        const dy = item.targetY - item.y;

        item.vx += dx * config.stiffness;
        item.vy += dy * config.stiffness;

        item.vx *= config.damping;
        item.vy *= config.damping;

        item.x += item.vx;
        item.y += item.vy;

        if (!item.dragging) {
          item.vx *= config.friction;
          item.vy *= config.friction;
        }

        item.element.style.transform = `translate(${item.x}px, ${item.y}px)`;
      }
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
    window.addEventListener('resize', () => {
      const newBounds = stage.getBoundingClientRect();
      bounds.width = newBounds.width;
      bounds.height = newBounds.height;
    });
  </script>
</body>
</html>
