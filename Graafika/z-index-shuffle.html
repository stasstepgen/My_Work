<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z-Index Shuffle</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top left, rgba(63, 156, 255, 0.18), transparent 24%),
                  radial-gradient(circle at bottom right, rgba(197, 111, 255, 0.18), transparent 24%),
                  #090b14;
      color: #eef2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .stage {
      position: relative;
      width: min(100%, 1100px);
      height: min(100vh, 720px);
      border-radius: 38px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 40px 140px rgba(0, 0, 0, 0.28);
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .stage::before {
      content: 'Click any card to bring it forward.';
      position: absolute;
      left: 2rem;
      top: 1.5rem;
      right: 2rem;
      font-size: 1.05rem;
      color: rgba(238, 242, 255, 0.75);
      pointer-events: none;
    }

    .card {
      position: absolute;
      width: 240px;
      height: 320px;
      border-radius: 28px;
      background: rgba(15, 22, 48, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
      display: grid;
      place-items: center;
      color: #f8fbff;
      text-align: center;
      user-select: none;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.34);
      border-color: rgba(255, 255, 255, 0.22);
    }

    .card-title {
      margin: 0;
      font-size: clamp(1.25rem, 2vw, 1.65rem);
      letter-spacing: -0.03em;
    }

    .card-index {
      margin-top: 0.75rem;
      color: rgba(175, 199, 255, 0.8);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>

  <script>
    const stage = document.getElementById('stage');
    const cardData = [
      { title: 'Layer One', x: 64, y: 90, color: '#5b9dff' },
      { title: 'Layer Two', x: 320, y: 140, color: '#ff7cc0' },
      { title: 'Layer Three', x: 220, y: 320, color: '#6dffca' },
      { title: 'Layer Four', x: 540, y: 120, color: '#f3ff72' },
      { title: 'Layer Five', x: 520, y: 330, color: '#a58bff' }
    ];

    let topZ = cardData.length;

    cardData.forEach((data, index) => {
      const card = document.createElement('button');
      card.className = 'card';
      card.style.left = `${data.x}px`;
      card.style.top = `${data.y}px`;
      card.style.zIndex = `${index + 1}`;
      card.style.background = `linear-gradient(180deg, rgba(18, 31, 68, 0.95), rgba(20, 30, 58, 0.98)), ${data.color}`;
      card.innerHTML = `<div>
          <h2 class="card-title">${data.title}</h2>
          <div class="card-index">Click to bring forward</div>
        </div>`;

      card.addEventListener('click', () => {
        topZ += 1;
        card.style.zIndex = topZ;
      });

      stage.appendChild(card);
    });
  </script>
</body>
</html>
