<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eraser Mode</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(35, 157, 255, 0.24), transparent 22%),
                  radial-gradient(circle at 80% 22%, rgba(255, 123, 198, 0.2), transparent 18%),
                  radial-gradient(circle at 50% 80%, rgba(92, 255, 211, 0.18), transparent 26%),
                  #08101e;
      color: #edf2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .stage {
      position: relative;
      width: min(100%, 1080px);
      height: min(100vh, 760px);
      border-radius: 36px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(8, 16, 38, 0.95), rgba(11, 22, 49, 0.92));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.32);
      display: grid;
      place-items: center;
      padding: 2rem;
      backdrop-filter: blur(16px);
    }

    .wallpaper {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 25%, rgba(87, 188, 255, 0.4), transparent 18%),
                  radial-gradient(circle at 80% 20%, rgba(255, 136, 220, 0.32), transparent 16%),
                  radial-gradient(circle at 50% 80%, rgba(132, 255, 220, 0.24), transparent 20%),
                  linear-gradient(135deg, rgba(10, 16, 41, 0.95), rgba(4, 8, 17, 0.95));
      pointer-events: none;
    }

    .note {
      position: absolute;
      top: 1.5rem;
      left: 2rem;
      right: 2rem;
      color: rgba(237, 242, 255, 0.8);
      font-size: 1rem;
      z-index: 3;
      pointer-events: none;
    }

    .grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 980px;
      margin-top: 2rem;
    }

    .tile {
      position: relative;
      min-height: 220px;
      border-radius: 28px;
      background: rgba(18, 30, 60, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
      transition: background 0.35s ease, transform 0.35s ease, opacity 0.35s ease;
      cursor: crosshair;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      color: #f1f6ff;
    }

    .tile:hover {
      background: rgba(18, 30, 60, 0.2);
      transform: scale(1.02);
      opacity: 0.16;
      border-color: rgba(255, 255, 255, 0.08);
    }

    .tile::after {
      content: 'ERASED';
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.15);
      font-size: 1.25rem;
      letter-spacing: 0.2em;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    .tile:hover::after {
      opacity: 1;
    }

    .tile-title {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(1.05rem, 1.5vw, 1.4rem);
      line-height: 1.4;
      max-width: 90%;
    }

    @media (max-width: 840px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="wallpaper"></div>
    <div class="note">Hover over any tile to erase it and reveal the wallpaper beneath.</div>
    <div class="grid">
      <div class="tile"><p class="tile-title">Eraser Mode on hover</p></div>
      <div class="tile"><p class="tile-title">Transparent reveal effect</p></div>
      <div class="tile"><p class="tile-title">Cursor-driven erasing</p></div>
      <div class="tile"><p class="tile-title">Soft fade to reveal</p></div>
      <div class="tile"><p class="tile-title">Background peek-through</p></div>
      <div class="tile"><p class="tile-title">Glassy erase interaction</p></div>
    </div>
  </div>
</body>
</html>
